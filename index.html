<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Gestión y Red Financiera - Davivienda</title>
    
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para traducir JSX a JavaScript -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes slideRight {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        .selection\:bg-red-100 *::selection { background-color: #fee2e2; color: #E01E26; }
        
        /* Ajustes específicos para Guardar como PDF o Imprimir */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .print-avoid-break {
                page-break-inside: avoid;
                break-inside: avoid;
            }
            @page { margin: 1cm; }
        }
    </style>
</head>
<body class="text-gray-800 bg-[#F9FAFB] min-h-screen selection:bg-red-100 selection:text-[#E01E26]">
    
    <!-- Contenedor Principal -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- SVGs Icons Components ---
        const IconMenu = () => <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>;
        const IconX = () => <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>;
        const IconBuilding = () => <svg className="w-12 h-12 lg:w-16 lg:h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>;
        const IconUsers = () => <svg className="w-12 h-12 lg:w-16 lg:h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>;
        const IconKey = () => <svg className="w-12 h-12 lg:w-16 lg:h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>;
        const IconShield = () => <svg className="w-12 h-12 lg:w-16 lg:h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>;
        const IconTrending = () => <svg className="w-12 h-12 lg:w-16 lg:h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>;
        const IconCog = () => <svg className="w-12 h-12 lg:w-16 lg:h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>;

        // --- COMPONENTE: Fondo Global Difuminado ---
        const BackgroundWatermark = () => (
          <div className="fixed inset-0 z-[-1] pointer-events-none overflow-hidden bg-[#F9FAFB] print:hidden">
            <div className="absolute top-[-20%] right-[-10%] w-[80vw] h-[80vw] rounded-[100%] border-[1px] border-[#E01E26]/20 shadow-[0_0_80px_rgba(224,30,38,0.03)] transform rotate-12"></div>
            <div className="absolute top-[-10%] right-[-20%] w-[90vw] h-[90vw] rounded-[100%] border-[3px] border-[#E01E26]/10 shadow-[inset_0_0_100px_rgba(224,30,38,0.04)] transform rotate-45"></div>
            <div className="absolute bottom-[-30%] left-[-10%] w-[70vw] h-[70vw] rounded-[100%] border-[2px] border-gray-200 shadow-[0_0_120px_rgba(0,0,0,0.02)]"></div>

            <div className="absolute inset-0 flex items-center justify-center opacity-10 mix-blend-multiply">
                <img 
                  src="fondo_agua.png" 
                  alt="Marca de agua Davivienda" 
                  className="w-[70vw] max-w-[800px] object-contain"
                  onError={(e) => { 
                      e.target.style.display = 'none'; 
                      document.getElementById('fallback-logo').style.display = 'block';
                  }}
                />
                <div id="fallback-logo" className="hidden text-gray-800">
                   <svg className="w-[50vw] max-w-[500px] h-auto" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                   </svg>
                </div>
            </div>
          </div>
        );

        // --- Navigation Menu Component ---
        const Navbar = ({ toggleMenu, isMenuOpen }) => (
          <nav className="fixed print:absolute print:shadow-none w-full z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm print:bg-white">
            <div className="max-w-[1600px] w-[95%] mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-24 lg:h-28">
                
                {/* Logo representation - Actualizado con imagen */}
                <div className="flex-shrink-0 flex items-center gap-3">
                  <img 
                    src="titulo_final.png" 
                    alt="Davivienda" 
                    className="h-12 md:h-14 lg:h-16 w-auto object-contain" 
                    onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/200x60/FFFFFF/E01E26?text=Davivienda'; }} 
                  />
                </div>
                
                {/* Menú Desktop (Oculto en celulares, visible en pantallas grandes) */}
                <div className="hidden lg:flex items-center space-x-8 xl:space-x-12 print:hidden">
                    <a href="#relacion-vinculados" className="text-base lg:text-lg xl:text-xl font-semibold text-gray-600 hover:text-[#E01E26] transition-colors">Vinculados</a>
                    <a href="#uso-red" className="text-base lg:text-lg xl:text-xl font-semibold text-gray-600 hover:text-[#E01E26] transition-colors">Uso de Red</a>
                    <a href="#economias-escala" className="text-base lg:text-lg xl:text-xl font-semibold text-gray-600 hover:text-[#E01E26] transition-colors">Escala</a>
                    <a href="#arquitectura" className="text-base lg:text-lg xl:text-xl font-semibold text-gray-600 hover:text-[#E01E26] transition-colors">Arquitectura</a>
                    <a href="#optimizacion" className="text-base lg:text-lg xl:text-xl font-semibold text-gray-600 hover:text-[#E01E26] transition-colors">Optimización</a>
                    <a href="#reto-interactivo" className="text-base lg:text-lg xl:text-xl font-bold text-[#E01E26] hover:text-red-800 transition-colors">Reto</a>
                </div>

                <div className="flex lg:hidden items-center">
                  <button onClick={toggleMenu} className="text-[#1F2937] hover:text-[#E01E26] focus:outline-none transition-colors print:hidden">
                    {isMenuOpen ? <IconX /> : <IconMenu />}
                  </button>
                </div>
              </div>
            </div>

            {/* Mobile Menu Overlay */}
            {isMenuOpen && (
              <div className="absolute top-24 left-0 w-full h-screen bg-white shadow-2xl animate-fade-in flex flex-col pt-8 px-8 gap-8 text-2xl font-semibold text-gray-700 print:hidden lg:hidden">
                <a href="#relacion-vinculados" onClick={toggleMenu} className="hover:text-[#E01E26] border-b border-gray-100 pb-4 transition-colors">1. Relación entre Vinculados</a>
                <a href="#uso-red" onClick={toggleMenu} className="hover:text-[#E01E26] border-b border-gray-100 pb-4 transition-colors">2. Contrato de Uso de Red</a>
                <a href="#economias-escala" onClick={toggleMenu} className="hover:text-[#E01E26] border-b border-gray-100 pb-4 transition-colors">3. Economías de Escala</a>
                <a href="#arquitectura" onClick={toggleMenu} className="hover:text-[#E01E26] border-b border-gray-100 pb-4 transition-colors">4. Reto: Arquitectura y Talento</a>
                <a href="#optimizacion" onClick={toggleMenu} className="hover:text-[#E01E26] border-b border-gray-100 pb-4 transition-colors">5. Optimización Clientes y Producto</a>
                <a href="#reto-interactivo" onClick={toggleMenu} className="hover:text-[#E01E26] pb-4 transition-colors text-[#E01E26]">6. Reto de Conocimiento</a>
              </div>
            )}
          </nav>
        );

        // --- Sections Components ---
        const Hero = () => (
          <section className="relative pt-40 pb-32 lg:pt-56 lg:pb-48 overflow-hidden bg-white text-[#1F2937] bg-transparent">
            <div className="absolute top-0 right-0 -mr-20 -mt-20 w-[800px] h-[800px] bg-[#E01E26] opacity-5 rounded-full blur-3xl pointer-events-none"></div>
            <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-[600px] h-[600px] bg-[#E01E26] opacity-5 rounded-full blur-2xl pointer-events-none"></div>
            
            <div className="relative max-w-[1600px] w-[95%] mx-auto px-4 sm:px-6 lg:px-8 text-center z-10 print-avoid-break">
              <h1 className="text-6xl md:text-8xl lg:text-9xl font-extrabold tracking-tight mb-8 text-[#1F2937]">
                Proyecto Somos <span className="text-[#E01E26]">Uno</span>
              </h1>
              <p className="mt-8 text-2xl md:text-3xl lg:text-4xl text-gray-600 max-w-5xl lg:max-w-6xl mx-auto font-light leading-relaxed">
                Una visión integral desde el Contrato de Uso de Red hasta la optimización transversal para brindar la mejor experiencia a nuestros clientes.
              </p>
              <div className="mt-16 print:hidden">
                <a href="#relacion-vinculados" className="inline-block bg-[#E01E26] text-white font-bold text-xl lg:text-2xl py-6 px-14 rounded-full hover:bg-red-700 transition shadow-[0_8px_20px_rgba(224,30,38,0.3)] hover:shadow-[0_12px_25px_rgba(224,30,38,0.4)] transform hover:-translate-y-1">
                  Explorar el Modelo
                </a>
              </div>
            </div>
          </section>
        );

        const RelacionVinculados = () => {
          const pillars = [
            { num: "(i)", title: "Modelo de Relación", desc: "La relación se da de dos maneras fundamentales: mediante el Contrato de Uso de Red y a través de Operaciones Intercompany.", icon: <IconBuilding /> },
            { num: "(ii)", title: "Oferta Integral de Productos", desc: "Buscamos tener una oferta de productos completa y transversal para satisfacer a todos nuestros clientes.", icon: <IconShield /> },
            { num: "(iii)", title: "Comerciales Unificados", desc: "Implica que los equipos comerciales de todas las compañías hermanas pueden distribuir los productos de todo el grupo.", icon: <IconUsers /> },
            { num: "(iv)", title: "Vinculación Única", desc: "Ofrecemos un solo interlocutor dependiendo del segmento del cliente, simplificando radicalmente la comunicación.", icon: <IconKey /> },
            { num: "(v)", title: "Eficiencias Intercompany", desc: "Generamos sinergias profundas que nos permiten optimizar gastos, unificar procesos y estandarizar procedimientos.", icon: <IconCog /> },
            { num: "(vi)", title: "Un Solo Davivienda", desc: "El cliente es tratado de la mejor manera, con la rapidez de los procesos del grupo y un contacto fácil, eficaz y eficiente.", icon: <IconTrending /> }
          ];

          return (
            <section id="relacion-vinculados" className="py-32 bg-white/40 backdrop-blur-sm border-y border-red-50">
              <div className="max-w-[1600px] w-[95%] mx-auto px-4 sm:px-6 lg:px-8">
                <div className="mb-20 text-center print-avoid-break">
                  <h2 className="text-4xl md:text-6xl lg:text-7xl font-extrabold text-[#1F2937] mb-6">Relación entre Vinculados</h2>
                  <p className="text-2xl lg:text-3xl text-gray-600 max-w-5xl mx-auto leading-relaxed">Propósito estratégico y beneficios de nuestra sinergia corporativa.</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 lg:gap-12">
                  {pillars.map((pillar, idx) => (
                    <div key={idx} className="bg-white p-10 lg:p-12 rounded-3xl shadow-sm border border-gray-100 hover:border-red-100 relative overflow-hidden group hover:shadow-xl transition-all duration-300 print-avoid-break">
                      <div className="absolute top-0 right-0 p-6 opacity-5 text-[#E01E26] transform group-hover:scale-125 transition duration-500">
                        {pillar.icon}
                      </div>
                      <div className="text-[#E01E26] font-bold text-2xl mb-4">{pillar.num}</div>
                      <h4 className="text-2xl lg:text-3xl font-bold mb-6 text-[#1F2937] relative z-10">{pillar.title}</h4>
                      <p className="text-gray-600 text-lg lg:text-xl relative z-10 leading-relaxed">{pillar.desc}</p>
                    </div>
                  ))}
                </div>

                <div className="mt-20 flex flex-col sm:flex-row justify-center gap-8 print:hidden">
                  <a href="#uso-red" className="inline-flex items-center justify-center bg-white border-2 border-[#E01E26] text-[#E01E26] text-xl font-bold py-5 px-10 rounded-full hover:bg-red-50 transition shadow-sm hover:shadow-md transform hover:-translate-y-1">
                    Ver Uso de Red &rarr;
                  </a>
                  <a href="#economias-escala" className="inline-flex items-center justify-center bg-[#E01E26] text-white text-xl font-bold py-5 px-10 rounded-full hover:bg-red-700 transition shadow-[0_8px_20px_rgba(224,30,38,0.3)] hover:shadow-[0_12px_25px_rgba(224,30,38,0.4)] transform hover:-translate-y-1">
                    Ver Economías de Escala &rarr;
                  </a>
                </div>
              </div>
            </section>
          );
        };

        const UsoDeRed = () => (
          <section id="uso-red" className="py-32 bg-transparent">
            <div className="max-w-[1600px] w-[95%] mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-20 print-avoid-break">
                <span className="text-[#E01E26] font-bold uppercase tracking-wider text-base lg:text-lg bg-red-50/80 backdrop-blur-sm px-6 py-2 rounded-full inline-block mb-6">Dec. 2555 de 2010 (Art. 2.34.1.1.1)</span>
                <h2 className="text-4xl md:text-6xl lg:text-7xl font-extrabold text-[#1F2937] mb-8">¿Qué es el Contrato de Uso de Red?</h2>
                
                <div className="max-w-6xl mx-auto bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden group hover:shadow-xl transition-all duration-500 cursor-default print-avoid-break mt-12">
                  <div className="p-8 md:p-14 lg:p-20 flex flex-col md:flex-row items-center justify-between gap-10 relative">
                    <div className="absolute inset-0 bg-gradient-to-r from-transparent via-red-50/30 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    
                    <div className="relative z-10 flex flex-col items-center text-center transform group-hover:scale-105 transition duration-300">
                      <div className="w-24 h-24 lg:w-32 lg:h-32 bg-[#1F2937] rounded-3xl flex items-center justify-center text-white mb-6 shadow-md">
                        <IconBuilding />
                      </div>
                      <span className="font-bold text-[#1F2937] text-2xl lg:text-3xl mb-2">Entidad Prestataria</span>
                      <span className="text-sm lg:text-base text-gray-500 uppercase font-bold tracking-widest">"La Red"</span>
                    </div>

                    <div className="relative z-10 flex-1 flex flex-col items-center justify-center min-w-[300px] w-full py-8 md:py-0">
                      <div className="text-[#E01E26] font-bold text-lg lg:text-xl mb-6 flex items-center gap-3">
                        <span className="opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-100 text-2xl">💰</span>
                        Acuerdo Remunerado
                      </div>
                      
                      <div className="w-full flex items-center justify-center relative h-10">
                        <div className="absolute inset-0 flex items-center justify-between px-4 opacity-30">
                           {[...Array(12)].map((_, i) => <div key={i} className="w-2 h-2 rounded-full bg-gray-300"></div>)}
                        </div>
                        <div className="h-2 w-full bg-gray-100 rounded-full overflow-hidden relative">
                          <div className="absolute top-0 bottom-0 left-0 w-1/3 bg-gradient-to-r from-transparent via-[#E01E26] to-transparent animate-[slideRight_2s_linear_infinite] group-hover:animate-[slideRight_1s_linear_infinite]"></div>
                        </div>
                      </div>
                      
                      <div className="text-gray-500 text-sm lg:text-base mt-6 uppercase tracking-widest font-semibold flex items-center gap-3">
                        Infraestructura Compartida
                        <span className="opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-100 text-2xl">🚀</span>
                      </div>
                    </div>

                    <div className="relative z-10 flex flex-col items-center text-center transform group-hover:scale-105 transition duration-300">
                      <div className="w-24 h-24 lg:w-32 lg:h-32 bg-white border-[6px] border-[#E01E26] rounded-3xl flex items-center justify-center text-[#E01E26] mb-6 shadow-md">
                        <IconUsers />
                      </div>
                      <span className="font-bold text-[#1F2937] text-2xl lg:text-3xl mb-2">Entidad Usuaria</span>
                      <span className="text-sm lg:text-base text-[#E01E26] uppercase font-bold tracking-widest">Ofrece Productos</span>
                    </div>
                  </div>
                  
                  <div className="bg-gray-50 p-10 lg:p-14 text-center border-t border-gray-100 relative z-10">
                    <p className="text-xl md:text-2xl lg:text-3xl text-gray-700 leading-relaxed max-w-5xl mx-auto">
                      Un <strong className="text-[#1F2937]">acuerdo remunerado</strong> donde una entidad financiera ("La Red") permite que otra <strong className="text-[#E01E26]">ofrezca sus productos o servicios </strong> a través de su infraestructura.
                    </p>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 lg:gap-12 mt-20">
                <div className="bg-white rounded-3xl p-10 border border-gray-100 shadow-sm hover:shadow-md transition print-avoid-break">
                  <div className="text-[#E01E26] mb-6"><IconBuilding /></div>
                  <h3 className="text-2xl lg:text-3xl font-bold mb-4 text-[#1F2937]">La Red</h3>
                  <p className="text-gray-600 text-lg leading-relaxed">Oficinas, canales físicos, cajeros, aplicaciones digitales y personal informático compartido.</p>
                </div>
                <div className="bg-white rounded-3xl p-10 border border-gray-100 shadow-sm hover:shadow-md transition print-avoid-break">
                  <div className="text-[#E01E26] mb-6"><IconUsers /></div>
                  <h3 className="text-2xl lg:text-3xl font-bold mb-4 text-[#1F2937]">Productos Ofrecidos</h3>
                  <ul className="text-gray-600 text-lg space-y-3 list-disc pl-6 marker:text-[#E01E26]">
                    <li>Fondos de Inversión (FICs)</li>
                    <li>Fondos de Pensiones</li>
                    <li>Toma de órdenes de valores</li>
		    <li>Otras listadas en la norma</li> 
                  </ul>
                </div>
                <div className="bg-white rounded-3xl p-10 border border-gray-100 shadow-sm hover:shadow-md transition print-avoid-break">
                  <div className="text-[#E01E26] mb-6"><IconShield /></div>
                  <h3 className="text-2xl lg:text-3xl font-bold mb-4 text-[#1F2937]">Reglas Clave</h3>
                  <p className="text-gray-600 text-lg leading-relaxed">Identificación clara ante el cliente y capacitación obligatoria del personal sobre los productos.</p>
                </div>
                <div className="bg-[#E01E26] rounded-3xl p-10 shadow-lg hover:shadow-xl transition text-white print-avoid-break">
                  <div className="text-white mb-6 opacity-90"><IconTrending /></div>
                  <h3 className="text-2xl lg:text-3xl font-bold mb-4">El Beneficio</h3>
                  <p className="text-red-100 text-lg leading-relaxed">Más acceso a servicios en un solo lugar, transparencia, seguridad y trabajo en equipo inter-entidades.</p>
                </div>
              </div>

              <div className="mt-20 text-center print:hidden">
                <a href="#relacion-vinculados" className="inline-flex items-center justify-center border-2 border-gray-200 text-gray-500 text-xl font-bold py-5 px-10 rounded-full hover:border-[#E01E26] hover:text-[#E01E26] hover:bg-red-50 transition shadow-sm transform hover:-translate-y-1">
                  &larr; Volver a Relación entre Vinculados
                </a>
              </div>
            </div>
          </section>
        );

        const EconomiasEscala = () => {
          const [activeReq, setActiveReq] = useState(null);

          const requisitos = [

                      <div className="absolute inset-0 bg-gradient-to-t from-[#1F2937] via-[#1F2937]/60 to-transparent opacity-90"></div>
                      <div className="absolute bottom-0 left-0 p-10 md:p-14">
                        <div className="bg-[#E01E26] text-white text-sm font-bold px-4 py-2 rounded uppercase tracking-widest inline-block mb-4 shadow-md">Hito Físico</div>
                        <h3 className="text-4xl lg:text-5xl font-bold text-white mb-4">Edificio Los Venados</h3>
                        <p className="text-gray-200 text-lg lg:text-xl leading-relaxed max-w-2xl">
                          Optimizamos este edificio para que todos los comerciales estuvieran cerca, fomentando sinergias de ideas y mercado en un solo lugar.
                        </p>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="text-center mb-20 border-b border-gray-100 pb-16 pt-16 print-avoid-break">
                  <div className="inline-block px-6 py-2 rounded-full bg-red-50 text-[#E01E26] font-bold uppercase tracking-widest text-base mb-6 border border-red-100">Retos Compartidos</div>
                  <h2 className="text-4xl md:text-6xl lg:text-7xl font-extrabold text-[#1F2937] mt-4 mb-8">Retos de la Colaboración</h2>
                  <p className="text-2xl lg:text-3xl text-gray-600 max-w-5xl mx-auto leading-relaxed">
                    Al apalancarse en la red del Banco, fue imperativo estructurar el modelo para proteger la naturaleza del negocio fiduciario, asegurando el cumplimiento regulatorio y la transparencia.
                  </p>
                </div>

                <div className="flex flex-col lg:flex-row-reverse gap-20 items-center print-avoid-break">
                  <div className="flex-1">
                    <div className="inline-block bg-[#E01E26] text-white font-bold px-5 py-2 rounded-full text-base mb-6 uppercase tracking-widest shadow-sm">Reto 2</div>
                    <h3 className="text-4xl md:text-5xl lg:text-6xl font-extrabold text-[#1F2937] mb-8">Responsabilidad y Deber Fiduciario</h3>
                    <p className="text-xl lg:text-2xl text-gray-600 mb-10 leading-relaxed">
                      El desafío central radicó en organizar milimétricamente las tareas operativas y proteger las decisiones core que debían permanecer, sin excepción, en la Fiduciaria.
                    </p>
                    
                    <div className="space-y-8">
                      {itemsReto2.map((item, idx) => (
                        <div key={`r2-${idx}`} className="flex gap-6 items-start group print-avoid-break">
                          <div className="w-12 h-12 rounded-full bg-red-50 border border-red-100 text-[#E01E26] font-bold text-xl flex items-center justify-center flex-shrink-0 group-hover:bg-[#E01E26] group-hover:text-white transition-colors duration-300">
                            {idx + 1}
                          </div>
                          <div>
                            <h4 className="text-2xl lg:text-3xl font-bold text-[#1F2937] mb-2">{item.title}</h4>
                            <p className="text-gray-600 text-lg lg:text-xl leading-relaxed">{item.desc}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="flex-1 w-full">
                    <div className="relative rounded-[2rem] overflow-hidden shadow-2xl group border border-gray-100 bg-white">
                      <img src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Consultoría legal y financiera" className="w-full h-auto object-cover transform group-hover:scale-105 transition duration-700" />
                      <div className="absolute inset-0 bg-gradient-to-t from-[#1F2937] via-[#1F2937]/60 to-transparent opacity-90"></div>
                      <div className="absolute bottom-0 left-0 p-10 md:p-14">
                        <div className="bg-[#E01E26] text-white text-sm font-bold px-4 py-2 rounded uppercase tracking-widest inline-block mb-4 shadow-md">Hito Operativo</div>
                        <h3 className="text-4xl lg:text-5xl font-bold text-white mb-4">Fronteras Claras</h3>
                        <p className="text-gray-200 text-lg lg:text-xl leading-relaxed max-w-2xl">
                          Separación absoluta entre la labor comercial y la toma de decisiones fiduciarias para proteger los intereses de los fideicomitentes.
                        </p>
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </section>
          );
        }

        const Optimizacion = () => (
          <section id="optimizacion" className="py-32 bg-white/40 backdrop-blur-sm border-t border-red-50 relative print-avoid-break">
            <div className="max-w-[1600px] w-[95%] mx-auto px-4 sm:px-6 lg:px-8 text-center">
              <h2 className="text-4xl md:text-6xl lg:text-7xl font-extrabold text-[#1F2937] mb-8">Optimización Clientes y Producto</h2>
              <p className="text-2xl lg:text-3xl text-gray-600 max-w-5xl mx-auto mb-20 leading-relaxed">
                El área de producto se centralizó de manera transversal a las 3 compañías para los mercados financieros.
              </p>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-10 lg:gap-12 relative z-10">
                <div className="bg-white p-12 rounded-3xl shadow-sm border border-gray-100 transform hover:-translate-y-2 transition duration-300 hover:border-[#E01E26] print-avoid-break">
                  <h3 className="text-3xl lg:text-4xl font-bold mb-6 text-[#1F2937]">Canales</h3>
                  <p className="text-gray-600 text-xl leading-relaxed">Integración de la experiencia digital y física bajo una sola directriz.</p>
                </div>
                <div className="bg-[#E01E26] text-white p-12 rounded-3xl shadow-xl transform hover:-translate-y-2 transition duration-300 scale-105 z-20 print-avoid-break">
                  <h3 className="text-3xl lg:text-4xl font-bold mb-6">Área Centralizada</h3>
                  <p className="text-red-50 text-xl leading-relaxed">La eficiencia asegura que las ofertas se complementen: a quién se otorga, beneficios y asesoría.</p>
                </div>
                <div className="bg-white p-12 rounded-3xl shadow-sm border border-gray-100 transform hover:-translate-y-2 transition duration-300 hover:border-[#E01E26] print-avoid-break">
                  <h3 className="text-3xl lg:text-4xl font-bold mb-6 text-[#1F2937]">Construcción</h3>
                  <p className="text-gray-600 text-xl leading-relaxed">Creación de productos y mercadeo unificado para todo el ecosistema de valores.</p>
                </div>
              </div>

              <div className="mt-32 max-w-6xl mx-auto bg-white p-16 lg:p-20 rounded-[3rem] shadow-xl border border-gray-100 relative print-avoid-break">
                <div className="absolute -top-8 left-1/2 transform -translate-x-1/2 bg-[#E01E26] text-white px-10 py-3 rounded-full font-bold shadow-md tracking-widest uppercase text-lg">
                  Nuestra Promesa
                </div>
                <h2 className="text-4xl md:text-6xl lg:text-7xl font-black text-[#1F2937] leading-tight">
                  Siempre <span className="text-[#E01E26]">EN BUSCA DE LO MEJOR</span> para el Cliente financiero.
                </h2>
              </div>
            </div>
          </section>
        );

        /* El reto interactivo lleva "print:hidden" para que no salga truncado en el PDF */
        const RetoInteractivo = () => {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [score, setScore] = useState(0);
          const [showScore, setShowScore] = useState(false);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [isCorrect, setIsCorrect] = useState(null);

          const questions = [
            {
              questionText: 'Según el Decreto 2555, ¿qué es un Contrato de Uso de Red?',
              answerOptions: [
                { answerText: 'Una fusión corporativa entre dos entidades financieras.', isCorrect: false },
                { answerText: 'Un acuerdo remunerado para usar la infraestructura de otra entidad.', isCorrect: true },
                { answerText: 'La creación de nuevas sucursales físicas compartidas.', isCorrect: false },
                { answerText: 'Una plataforma digital exclusiva para empleados.', isCorrect: false },
              ],
              feedback: '¡Correcto! Es un acuerdo donde "La Red" permite a una Entidad Usuaria ofrecer productos mediante su infraestructura instalada.'
            },
            {
              questionText: 'En el marco de la Relación entre Vinculados, ¿qué busca la "Vinculación Única"?',
              answerOptions: [
                { answerText: 'Tener múltiples asesores compitiendo por un mismo cliente.', isCorrect: false },
                { answerText: 'Obligar al cliente a firmar contratos físicos anualmente.', isCorrect: false },
                { answerText: 'Ofrecer un solo interlocutor dependiendo del segmento del cliente.', isCorrect: true },
                { answerText: 'Separar a los clientes exclusivamente por su ubicación geográfica.', isCorrect: false },
              ],
              feedback: '¡Exacto! La vinculación única simplifica radicalmente la comunicación al asignar un solo interlocutor, brindando una mejor experiencia.'
            },
            {
              questionText: 'En los Acuerdos de Colaboración (Economías de Escala), ¿cuál de las siguientes acciones NO está permitida?',
              answerOptions: [
                { answerText: 'Compartir sistemas de información y tecnología.', isCorrect: false },
                { answerText: 'Delegar o tercerizar actividades propias del "core" del negocio.', isCorrect: true },
                { answerText: 'Que la Junta Directiva apruebe y monitoree el contrato.', isCorrect: false },
                { answerText: 'Formalizar el aprovechamiento de infraestructura instalada.', isCorrect: false },
              ],
              feedback: '¡Muy bien! Existe una delimitación estricta: no se puede delegar el "core" del negocio (delegación de profesionalidad).'
            },
            {
              questionText: 'Según los requisitos de las Economías de Escala, ¿quién debe aprobar y monitorear estos contratos?',
              answerOptions: [
                { answerText: 'Únicamente el Área de Recursos Humanos.', isCorrect: false },
                { answerText: 'El Comité Jurídico exclusivamente.', isCorrect: false },
                { answerText: 'La Superintendencia Financiera de Colombia.', isCorrect: false },
                { answerText: 'La Junta Directiva de las entidades contratantes.', isCorrect: true },
              ],
              feedback: '¡Correcto! El contrato debe constar por escrito y ser gestionado directamente por la Junta Directiva, fijando además planes de mejora.'
            },
            {
              questionText: 'Durante la transformación de Corredores Davivienda, ¿hacia dónde se movieron las fuerzas corporativas?',
              answerOptions: [
                { answerText: 'A la Fiduciaria Davivienda.', isCorrect: false },
                { answerText: 'Al área de mercadeo digital.', isCorrect: false },
                { answerText: 'A la tesorería de Banco Davivienda.', isCorrect: true },
                { answerText: 'Se independizaron del grupo.', isCorrect: false },
              ],
              feedback: '¡Exacto! Las fuerzas corporativas pasaron a la tesorería del Banco, logrando que Corredores se especializara en Banca Privada.'
            },
            {
              questionText: 'Para superar el reto de "Arquitectura y Talento Humano", ¿qué hito físico fue fundamental?',
              answerOptions: [
                { answerText: 'La creación de un centro de atención telefónica (Call Center).', isCorrect: false },
                { answerText: 'La optimización del Edificio Los Venados.', isCorrect: true },
                { answerText: 'La construcción de una nueva sede internacional.', isCorrect: false },
                { answerText: 'El cierre masivo de oficinas de atención física.', isCorrect: false },
              ],
              feedback: '¡Excelente! Se optimizó el Edificio Los Venados para que todos los comerciales estuvieran cerca, fomentando las sinergias de ideas.'
            },
            {
              questionText: 'En el Reto de la Fiduciaria Davivienda, ¿cuál fue el desafío central u "Hito Operativo"?',
              answerOptions: [
                { answerText: 'Demarcar dónde termina la gestión comercial y dónde empieza la decisión fiduciaria.', isCorrect: true },
                { answerText: 'Vender únicamente fondos de inversión a clientes corporativos.', isCorrect: false },
                { answerText: 'Fusionar legalmente al Banco y a la Fiduciaria en una sola entidad.', isCorrect: false },
                { answerText: 'Trasladar los riesgos de los portafolios al Banco Davivienda.', isCorrect: false },
              ],
              feedback: '¡Muy bien! Fue crucial formalizar "Fronteras Claras" operativas para proteger el deber fiduciario, el cual es indelegable.'
            },
            {
              questionText: 'Gracias al uso de la red del Banco, ¿qué productos promueve principalmente la Fiduciaria en sus negocios de Fiducia de Inversión?',
              answerOptions: [
                { answerText: 'Tarjetas de crédito y libranzas.', isCorrect: false },
                { answerText: 'Cuentas de ahorro y CDT.', isCorrect: false },
                { answerText: 'Seguros de vida y pólizas vehiculares.', isCorrect: false },
                { answerText: 'FICs y DAFUTURO.', isCorrect: true },
              ],
              feedback: '¡Exacto! La promoción de negocios de Fiducia de Inversión, amparada en los ANS, se centra estratégicamente en FICs y DAFUTURO.'
            },
            {
              questionText: 'En cuanto a la Optimización de Clientes y Producto, ¿cuál es la principal ventaja de centralizar el área de producto?',
              answerOptions: [
                { answerText: 'Reducir la cantidad de productos disponibles.', isCorrect: false },
                { answerText: 'Asegurar que las ofertas se complementen, siempre en busca de lo mejor para el cliente.', isCorrect: true },
                { answerText: 'Permitir que las 3 compañías compitan internamente con el mismo portafolio.', isCorrect: false },
                { answerText: 'Subsidiar los costos entre las empresas del grupo.', isCorrect: false },
              ],
              feedback: '¡Correcto! La eficiencia radica en alinear destinatarios, beneficios y asesoría de manera transversal para todo el ecosistema de valores.'
            }
          ];

          const handleAnswerClick = (isCorrectAnswer, index) => {
            setSelectedAnswer(index);
            setIsCorrect(isCorrectAnswer);
            
            if (isCorrectAnswer) {
              setScore(score + 1);
            }

            setTimeout(() => {
              const nextQuestion = currentQuestion + 1;
              if (nextQuestion < questions.length) {
                setCurrentQuestion(nextQuestion);
                setSelectedAnswer(null);
                setIsCorrect(null);
              } else {
                setShowScore(true);
              }
            }, 4500); 
          };

          const restartQuiz = () => {
            setCurrentQuestion(0);
            setScore(0);
            setShowScore(false);
            setSelectedAnswer(null);
            setIsCorrect(null);
          };

          return (
            <section id="reto-interactivo" className="py-32 bg-transparent border-t border-red-50 print:hidden">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="text-center mb-16">
                  <div className="inline-block px-6 py-2 rounded-full bg-red-50 text-[#E01E26] font-bold uppercase tracking-widest text-base mb-6 border border-red-100">Evaluación Interactiva</div>
                  <h2 className="text-4xl md:text-6xl font-extrabold text-[#1F2937]">Reto de Conocimiento</h2>
                  <p className="mt-6 text-2xl text-gray-600">Pon a prueba lo que has aprendido sobre nuestro modelo de gestión.</p>
                </div>

                <div className="bg-white rounded-[2.5rem] shadow-xl border border-gray-200 overflow-hidden">
                  {showScore ? (
                    <div className="p-16 lg:p-24 text-center animate-fade-in">
                      <div className="text-8xl mb-8">🏆</div>
                      <h3 className="text-4xl lg:text-5xl font-bold text-[#1F2937] mb-6">¡Reto Completado!</h3>
                      <p className="text-3xl text-gray-600 mb-10">Obtuviste <span className="font-bold text-[#E01E26]">{score}</span> de {questions.length} aciertos.</p>
                      
                      {score === questions.length ? (
                        <p className="text-green-600 text-xl font-bold bg-green-50 p-6 rounded-2xl mb-12">¡Excelente! Dominas a la perfección el modelo de sinergia financiera.</p>
                      ) : (
                        <p className="text-blue-600 text-xl font-bold bg-blue-50 p-6 rounded-2xl mb-12">¡Buen intento! Te invitamos a repasar los escenarios corporativos.</p>
                      )}
                      
                      <button onClick={restartQuiz} className="bg-[#1F2937] text-white text-xl font-bold py-5 px-12 rounded-full hover:bg-gray-800 transition">
                        Intentar de nuevo
                      </button>
                    </div>
                  ) : (
                    <div className="flex flex-col">
                      <div className="w-full bg-gray-100 h-3">
                        <div 
                          className="bg-[#E01E26] h-3 transition-all duration-500 ease-out" 
                          style={{ width: `${((currentQuestion) / questions.length) * 100}%` }}
                        ></div>
                      </div>
                      
                      <div className="p-10 md:p-16 lg:p-20">
                        <div className="mb-12">
                          <span className="text-base lg:text-lg font-bold text-gray-400 uppercase tracking-widest">Pregunta {currentQuestion + 1} de {questions.length}</span>
                          <h3 className="text-3xl md:text-4xl lg:text-5xl font-bold text-[#1F2937] mt-4 leading-tight">{questions[currentQuestion].questionText}</h3>
                        </div>
                        
                        <div className="space-y-6">
                          {questions[currentQuestion].answerOptions.map((answerOption, index) => {
                            let btnClass = "w-full text-left p-6 lg:p-8 rounded-2xl border-[3px] transition-all duration-300 font-medium text-xl lg:text-2xl ";
                            
                            if (selectedAnswer === null) {
                              btnClass += "border-gray-200 text-gray-700 hover:border-[#E01E26] hover:bg-red-50 cursor-pointer";
                            } else if (index === selectedAnswer) {
                              btnClass += isCorrect 
                                ? "border-green-500 bg-green-50 text-green-700" 
                                : "border-red-500 bg-red-50 text-red-700";
                            } else if (answerOption.isCorrect && selectedAnswer !== null) {
                              btnClass += "border-green-500 bg-green-50 text-green-700 opacity-50";
                            } else {
                              btnClass += "border-gray-200 text-gray-400 opacity-50";
                            }

                            return (
                              <button 
                                key={index}
                                disabled={selectedAnswer !== null}
                                onClick={() => handleAnswerClick(answerOption.isCorrect, index)}
                                className={btnClass}
                              >
                                {answerOption.answerText}
                              </button>
                            );
                          })}
                        </div>

                        {selectedAnswer !== null && (
                          <div className={`mt-10 p-6 lg:p-8 rounded-2xl animate-fade-in ${isCorrect ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                            <p className="font-bold text-2xl mb-2">{isCorrect ? '✓ ¡Respuesta Correcta!' : '✗ Respuesta Incorrecta'}</p>
                            <p className="text-lg lg:text-xl">{questions[currentQuestion].feedback}</p>
                          </div>
                        )}

                      </div>
                    </div>
                  )}
                </div>
              </div>
            </section>
          );
        };

        const Footer = () => (
          <footer className="bg-[#E01E26] text-white py-16 lg:py-20 print-avoid-break relative z-10">
            <div className="max-w-[1600px] w-[95%] mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-10">
              <div className="text-left w-full md:w-auto">
                <h2 className="text-3xl lg:text-4xl font-black tracking-tight leading-tight">Comité Jurídico</h2>
                <h2 className="text-3xl lg:text-4xl font-black tracking-tight leading-tight mb-6">9 de junio</h2>
                
                <div className="text-lg lg:text-xl font-bold leading-relaxed opacity-95">
                  <p>Dirección Jurídica</p>
                  <p>Corredores Davivienda</p>
                  <p>Fiduciaria Davivienda</p>
                </div>
              </div>

              {/* Logo en el Footer - Actualizado con fondo blanco para contraste */}
              <div className="w-full md:w-auto border-t border-white/30 md:border-none pt-8 md:pt-0 flex justify-start md:justify-end">
                <div className="bg-white px-6 py-4 rounded-3xl shadow-2xl inline-block transform hover:scale-105 transition duration-300">
                  <img 
                    src="titulo_final.png" 
                    alt="Davivienda" 
                    className="h-12 lg:h-16 w-auto object-contain" 
                    onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/200x60/FFFFFF/E01E26?text=Davivienda'; }} 
                  />
                </div>
              </div>
            </div>
          </footer>
        );

        const App = () => {
          const [isMenuOpen, setIsMenuOpen] = useState(false);

          return (
            <div className="relative font-sans text-gray-800 min-h-screen selection:bg-red-100 selection:text-[#E01E26]">
              <BackgroundWatermark />
              <Navbar toggleMenu={() => setIsMenuOpen(!isMenuOpen)} isMenuOpen={isMenuOpen} />
              <Hero />
              <RelacionVinculados />
              <UsoDeRed />
              <EconomiasEscala />
              <ArquitecturaTalento />
              <Optimizacion />
              <RetoInteractivo />
              <Footer />
            </div>
          );
        };

        // Renderizado de React en el contenedor root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
